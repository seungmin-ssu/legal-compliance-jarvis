<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DONNA - Legal Compliance Intelligence</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚖️</text></svg>">
    <script src="donna_db.js"></script>
    
    <style>
        /* 다크 테마 배경 */
        body { background-color: #05080F; color: #E2E8F0; font-family: 'Pretendard', 'Malgun Gothic', sans-serif; margin: 0; padding: 20px; height: 100vh; box-sizing: border-box; display: flex; gap: 20px; overflow: hidden; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #1E293B; border-radius: 10px; }
        
        /* 좌측 뉴스레터 패널 */
        .news-sidebar { width: 380px; background: linear-gradient(145deg, #0F172A, #0B111A); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; padding: 30px; display: flex; flex-direction: column; box-shadow: 0 20px 40px rgba(0,0,0,0.4); z-index: 50; }
        .news-header { font-size: 1.2rem; font-weight: bold; color: #BFAA71; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; letter-spacing: 0.5px; }
        
        .nl-search-wrapper { position: relative; width: 100%; margin-bottom: 25px; }
        .nl-search-box { display: flex; background: #162032; border-radius: 12px; border: 1px solid rgba(191,170,113,0.2); overflow: hidden; transition: 0.3s; }
        .nl-search-box:focus-within { border-color: #BFAA71; box-shadow: 0 0 15px rgba(191,170,113,0.15); }
        .nl-search-box input { flex: 1; padding: 15px; border: none; background: transparent; color: #F8FAFC; outline: none; }
        .nl-search-box button { padding: 0 20px; background: rgba(191,170,113,0.1); border: none; border-left: 1px solid rgba(191,170,113,0.2); color: #BFAA71; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .nl-search-box button:hover { background: #BFAA71; color: #0B111A; }
        
        .nl-autocomplete-list { position: absolute; top: 100%; left: 0; width: 100%; background: rgba(15,23,42,0.95); backdrop-filter: blur(10px); border: 1px solid #BFAA71; border-radius: 12px; z-index: 1000; max-height: 250px; overflow-y: auto; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-top: 8px; }
        .nl-autocomplete-item { padding: 12px 15px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; }
        .nl-autocomplete-item:hover { background: rgba(191,170,113,0.1); color: #BFAA71; }
        
        .news-results { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; padding-right: 5px; }
        .news-card { background: #131C2D; border: 1px solid rgba(255,255,255,0.03); border-radius: 16px; padding: 20px; transition: 0.3s; }
        .news-card:hover { transform: translateY(-3px); border-color: rgba(191,170,113,0.3); background: #162238; }
        .news-badge { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; margin-bottom: 12px; color: #fff; background: rgba(255,255,255,0.1); }
        .news-title { font-size: 0.95rem; font-weight: 600; line-height: 1.5; margin-bottom: 15px; }
        .news-link { display: inline-block; color: #0B111A; background: #BFAA71; text-decoration: none; padding: 8px 15px; border-radius: 8px; font-size: 0.8rem; font-weight: bold; transition: 0.3s; }
        .news-link:hover { box-shadow: 0 0 15px rgba(191,170,113,0.4); }

        /* 우측 메인 컨텐츠 패널 (미니멀 검색 엔진 스타일) */
        .main-content { flex: 1; background: linear-gradient(145deg, #0F172A, #080D16); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); position: relative; overflow-y: auto; }
        
        h1 { font-size: 4rem; margin-bottom: 2.5rem; letter-spacing: 8px; color: transparent; background: linear-gradient(90deg, #BFAA71, #FDF5A9); -webkit-background-clip: text; font-weight: 900; text-shadow: 0 10px 30px rgba(191,170,113,0.2); }
        
        /* 메인 검색창 */
        .search-container { width: 100%; max-width: 750px; display: flex; margin-bottom: 3rem; position: relative; border-radius: 20px; background: #162032; border: 1px solid rgba(191,170,113,0.3); box-shadow: 0 15px 40px rgba(0,0,0,0.4); transition: 0.3s; z-index: 100; }
        .search-container:focus-within { box-shadow: 0 0 40px rgba(191,170,113,0.25); border-color: #BFAA71; }
        .input-wrapper { flex: 1; position: relative; display: flex; }
        .search-box { flex: 1; padding: 22px 35px; font-size: 1.25rem; border: none; background: transparent; color: #F8FAFC; outline: none; border-radius: 20px 0 0 20px; letter-spacing: 0.5px; }
        .search-btn { padding: 0 45px; font-size: 1.15rem; border: none; border-radius: 0 20px 20px 0; background: linear-gradient(145deg, #BFAA71, #D4C391); color: #0B111A; cursor: pointer; font-weight: 800; transition: 0.3s; }
        .search-btn:hover { background: #FDF5A9; box-shadow: 0 0 20px rgba(191,170,113,0.5); }
        
        .autocomplete-list { position: absolute; top: 100%; left: 0; right: 0; background: rgba(15,23,42,0.95); backdrop-filter: blur(15px); border: 1px solid #BFAA71; border-radius: 16px; z-index: 1000; max-height: 350px; overflow-y: auto; display: none; box-shadow: 0 20px 50px rgba(0,0,0,0.6); margin-top: 15px; }
        .autocomplete-item { padding: 18px 35px; cursor: pointer; color: #E2E8F0; display: flex; align-items: center; gap: 15px; font-size: 1.1rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .autocomplete-item:hover { background: rgba(191,170,113,0.1); color: #BFAA71; }
        
        /* 🌍 초대형 센터 지구본 (승민님 이미지 연동) */
        .center-globe-wrapper { position: relative; width: 100%; max-width: 450px; aspect-ratio: 1 / 1; display: flex; justify-content: center; align-items: center; z-index: 10; margin-top: 2rem; }
        
        .center-globe-image { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
            border-radius: 50%;
            /* 웅장하게 위아래로 부양하며 네온빛 뿜는 애니메이션 */
            animation: floatGiantGlobe 8s ease-in-out infinite, pulseGiantGlow 5s alternate infinite; 
            opacity: 0.9;
        }

        @keyframes floatGiantGlobe {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }
        
        @keyframes pulseGiantGlow {
            0% { filter: drop-shadow(0 0 20px rgba(79, 138, 255, 0.2)); }
            100% { filter: drop-shadow(0 0 60px rgba(79, 138, 255, 0.6)); }
        }
    </style>
</head>
<body>
    
    <aside class="news-sidebar">
        <div class="news-header">📰 실시간 법무 뉴스레터</div>
        <div class="nl-search-wrapper">
            <div class="nl-search-box">
                <input type="text" id="newsletterInput" placeholder="예: 부동산 규제, AI Act" autocomplete="off" onkeypress="if(event.key === 'Enter') searchNewsletter()">
                <button onclick="searchNewsletter()">검색</button>
            </div>
            <div id="nlAutocompleteList" class="nl-autocomplete-list"></div>
        </div>
        <div class="news-results" id="newsletterResults">
            <div style="color:#64748B; font-size:0.9rem; text-align:center; margin-top:50px; line-height:1.6;">관심 키워드를 검색하면<br>국내외 Top 로펌 및 기관 자료를<br>동시에 찾아드립니다.</div>
        </div>
    </aside>

    <main class="main-content">
        
        <h1>DONNA</h1>
        
        <div class="search-container">
            <div class="input-wrapper">
                <input type="text" id="searchInput" class="search-box" placeholder="법령, 판례, 규제 동향 통합 리서치" autocomplete="off" onkeypress="if(event.key === 'Enter') performMainSearch()">
                <div id="autocompleteList" class="autocomplete-list"></div>
            </div>
            <button class="search-btn" onclick="performMainSearch()">리서치</button>
        </div>
        
        <div class="center-globe-wrapper">
            <img src="globe.png" alt="Global Compliance" class="center-globe-image" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/SNice.svg/120px-SNice.svg.png'; this.style.opacity='0.1';">
        </div>

    </main>

    <script>
        function searchNewsletter() {
            const q = document.getElementById('newsletterInput').value;
            if (!q.trim()) return;
            const resultsDiv = document.getElementById('newsletterResults');
            const encodedQ = encodeURIComponent(`"${q}"`); 
            
            resultsDiv.innerHTML = `
                <div class="news-card"><span class="news-badge" style="background-color: #334155;">김·장/율촌/광장/태평양/세종</span><div class="news-title">국내 5대 로펌 '${q}' 뉴스레터</div><a href="https://www.google.com/search?q=site:kimchang.com+OR+site:yulchon.com+OR+site:shinkim.com+OR+site:bkl.co.kr+OR+site:leeko.com+${encodedQ}+뉴스레터" target="_blank" class="news-link">자료 보기 ↗</a></div>
                <div class="news-card"><span class="news-badge" style="background-color: #475569;">Kirkland / Latham / Skadden</span><div class="news-title">Global Big Law '${q}' Insight</div><a href="https://www.google.com/search?q=site:kirkland.com+OR+site:lw.com+OR+site:skadden.com+OR+site:bakermckenzie.com+OR+site:whitecase.com+${encodedQ}+%22Client+Alert%22+OR+newsletter" target="_blank" class="news-link">Insight 보기 ↗</a></div>
                <div class="news-card"><span class="news-badge" style="background-color: #1E293B; border: 1px solid #475569;">법률신문 / 리걸타임즈</span><div class="news-title">법률 미디어 '${q}' 기사</div><a href="https://www.google.com/search?q=site:lawtimes.co.kr+OR+site:legaltimes.co.kr+${encodedQ}" target="_blank" class="news-link">기사 보기 ↗</a></div>
            `;
            document.getElementById('nlAutocompleteList').style.display = 'none';
        }

        const searchInput = document.getElementById('searchInput');
        const autocompleteList = document.getElementById('autocompleteList');
        const nlInput = document.getElementById('newsletterInput');
        const nlAutocompleteList = document.getElementById('nlAutocompleteList');

        function setupAutocomplete(inputElement, listElement, isMainSearch) {
            inputElement.addEventListener('input', function() {
                const val = this.value.toLowerCase();
                listElement.innerHTML = ''; 
                if (!val) { listElement.style.display = 'none'; return; }
                
                const filtered = legalKeywords.filter(k => k.toLowerCase().includes(val));
                if (filtered.length > 0) {
                    listElement.style.display = 'block';
                    filtered.forEach(k => {
                        const d = document.createElement('div');
                        d.className = isMainSearch ? 'autocomplete-item' : 'nl-autocomplete-item';
                        const regex = new RegExp("(" + val + ")", "gi");
                        d.innerHTML = `🔍 ` + k.replace(regex, "<strong style='color:#BFAA71;'>$1</strong>");
                        d.onclick = () => { 
                            inputElement.value = k; listElement.style.display = 'none'; 
                            isMainSearch ? performMainSearch() : searchNewsletter();
                        };
                        listElement.appendChild(d);
                    });
                } else { listElement.style.display = 'none'; }
            });
        }

        if(typeof legalKeywords !== 'undefined') {
            setupAutocomplete(searchInput, autocompleteList, true);
            setupAutocomplete(nlInput, nlAutocompleteList, false);
        } else {
            console.error("donna_db.js 파일이 로드되지 않았습니다!");
        }

        function performMainSearch() { const q = searchInput.value; if (q.trim()) window.location.href = 'search_results.html?q=' + encodeURIComponent(q); }
        
        document.addEventListener('click', (e) => { 
            if (e.target !== searchInput) autocompleteList.style.display = 'none'; 
            if (e.target !== nlInput) nlAutocompleteList.style.display = 'none';
        });
    </script>
</body>
</html>
