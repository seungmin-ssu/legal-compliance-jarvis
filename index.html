<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마이 리걸 컴플라이언스 자비스</title>
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Malgun Gothic', sans-serif; display: flex; min-height: 100vh; margin: 0; }
        .news-sidebar { width: 380px; background-color: #1a1a1a; border-right: 1px solid #333; padding: 30px 20px; display: flex; flex-direction: column; box-sizing: border-box; }
        .news-header { font-size: 1.2rem; font-weight: bold; color: #4da8da; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .nl-search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .nl-search-box input { flex: 1; padding: 12px; border-radius: 5px; border: 1px solid #333; background: #242424; color: white; outline: none; }
        .nl-search-box button { padding: 10px 20px; background: #4da8da; border: none; border-radius: 5px; color: #121212; font-weight: bold; cursor: pointer; }
        .news-results { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .news-card { background-color: #242424; border: 1px solid #333; border-radius: 10px; padding: 15px; transition: 0.2s; }
        .news-card:hover { border-color: #4da8da; }
        .news-badge { display: inline-block; padding: 4px 10px; border-radius: 15px; font-size: 0.72rem; font-weight: bold; margin-bottom: 10px; color: #fff; }
        .news-title { font-size: 0.95rem; font-weight: bold; line-height: 1.4; margin-bottom: 15px; color: #ffffff; }
        .news-link { display: inline-block; color: #121212; background-color: #4da8da; text-decoration: none; padding: 8px 15px; border-radius: 5px; font-size: 0.8rem; font-weight: bold; }
        .main-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; box-sizing: border-box; }
        h1 { font-size: 2.5rem; margin-bottom: 2rem; letter-spacing: 2px; color: #4da8da; }
        .search-container { width: 100%; max-width: 600px; display: flex; margin-bottom: 4rem; position: relative; }
        .input-wrapper { flex: 1; position: relative; display: flex; }
        .search-box { flex: 1; padding: 15px 20px; font-size: 1.2rem; border: 1px solid #333; border-radius: 30px 0 0 30px; background-color: #1e1e1e; color: white; outline: none; }
        .search-btn { padding: 15px 30px; font-size: 1.2rem; border: none; border-radius: 0 30px 30px 0; background-color: #4da8da; color: #121212; cursor: pointer; font-weight: bold; }
        .autocomplete-list { position: absolute; top: 100%; left: 0; right: 0; background-color: #1e1e1e; border: 1px solid #4da8da; border-top: none; border-radius: 0 0 20px 20px; z-index: 1000; max-height: 300px; overflow-y: auto; display: none; box-shadow: 0 8px 16px rgba(0,0,0,0.5); margin-top: -10px; padding-top: 10px; }
        .autocomplete-item { padding: 12px 20px; cursor: pointer; color: #e0e0e0; display: flex; align-items: center; gap: 15px; font-size: 1.05rem; }
        .autocomplete-item:hover { background-color: #333333; }
        .grid-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; width: 100%; max-width: 1000px; }
        .category-box { width: calc(25% - 20px); min-width: 200px; background-color: #1e1e1e; border: 1px solid #333; border-radius: 10px; padding: 25px 15px; text-align: center; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; }
        .category-box:hover { transform: translateY(-5px); border-color: #4da8da; }
        .img-icon, .custom-icon { height: 45px; width: 45px; object-fit: contain; margin-bottom: 15px; }
        .dual-flags { display: flex; gap: 10px; margin-bottom: 15px; }
        .dual-flags .img-icon { height: 35px; width: auto; }
        .category-title { font-size: 1.1rem; font-weight: bold; margin-bottom: 10px; }
        .category-desc { font-size: 0.75rem; color: #aaaaaa; line-height: 1.4; }
    </style>
</head>
<body>

    <aside class="news-sidebar">
        <div class="news-header">📰 실시간 법무 뉴스레터 검색</div>
        <div class="nl-search-box">
            <input type="text" id="newsletterInput" placeholder="예: 부동산 규제, AI 컴플라이언스" onkeypress="if(event.key === 'Enter') searchNewsletter()">
            <button onclick="searchNewsletter()">검색</button>
        </div>
        <div class="news-results" id="newsletterResults">
            <div style="color:#aaa; font-size:0.9rem; text-align:center; margin-top:50px;">관심 있는 키워드를 검색하면<br>국내외 주요 기관의 뉴스레터를<br>즉시 찾아드립니다.</div>
        </div>
    </aside>

    <main class="main-content">
        <h1>LEGAL COMPLIANCE JARVIS</h1>
        <div class="search-container">
            <div class="input-wrapper">
                <input type="text" id="searchInput" class="search-box" placeholder="법령, 판례, 논문 통합 검색" autocomplete="off" onkeypress="if(event.key === 'Enter') performMainSearch()">
                <div id="autocompleteList" class="autocomplete-list"></div>
            </div>
            <button class="search-btn" onclick="performMainSearch()">검색</button>
        </div>
        <div class="grid-container">
            <div class="category-box" onclick="quickSearch('대한민국')"><img src="https://flagcdn.com/w80/kr.png" class="img-icon"><div class="category-title">대한민국</div><div class="category-desc">법령, 판례, 부처 자료</div></div>
            <div class="category-box" onclick="quickSearch('미국')"><img src="https://flagcdn.com/w80/us.png" class="img-icon"><div class="category-title">미국 (US)</div><div class="category-desc">연방법, 판례, 기관 자료</div></div>
            <div class="category-box" onclick="quickSearch('유럽연합')"><img src="https://flagcdn.com/w80/eu.png" class="img-icon"><div class="category-title">유럽연합 (EU)</div><div class="category-desc">지침, 규정, 집행위 자료</div></div>
            <div class="category-box" onclick="quickSearch('중국 일본')"><div class="dual-flags"><img src="https://flagcdn.com/w80/cn.png" class="img-icon"><img src="https://flagcdn.com/w80/jp.png" class="img-icon"></div><div class="category-title">중국 & 일본</div><div class="category-desc">주요 법령 및 판례</div></div>
            <div class="category-box" onclick="quickSearch('국제재판소')"><svg class="custom-icon" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="none" stroke="#4da8da" stroke-width="3"/><path d="M50 20 V 80 M 25 35 Q 50 25 75 35 M 25 35 L 15 60 L 35 60 Z M 75 35 L 65 60 L 85 60 Z" fill="none" stroke="#ffffff" stroke-width="3"/></svg><div class="category-title">국제재판소</div><div class="category-desc">ICJ, ICC 등</div></div>
            <div class="category-box" onclick="quickSearch('UN')"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2f/Flag_of_the_United_Nations.svg/120px-Flag_of_the_United_Nations.svg.png" class="img-icon" style="border-radius:50%;"><div class="category-title">국제기구 & NGO</div><div class="category-desc">UN, 공식 보고서</div></div>
            <div class="category-box" onclick="quickSearch('논문')"><svg class="custom-icon" viewBox="0 0 100 100"><path d="M20 20 h60 v60 h-60 z M30 40 h40 M30 55 h40 M30 70 h20" fill="none" stroke="#ffffff" stroke-width="4"/></svg><div class="category-title">학술 논문</div><div class="category-desc">법학 등 융합 논문</div></div>
        </div>
    </main>

    <script>
        // 뉴스레터 검색 기능 고도화: 구글 다이렉트 검색 적용
        function searchNewsletter() {
            const q = document.getElementById('newsletterInput').value;
            if (!q.trim()) return;
            const resultsDiv = document.getElementById('newsletterResults');
            const encodedQ = encodeURIComponent(`"${q}"`); // 정확한 키워드 검색을 위해 따옴표 추가
            
            resultsDiv.innerHTML = `
                <div class="news-card">
                    <span class="news-badge" style="background-color: #2c3e50;">KIM & CHANG / 율촌 / 광장</span>
                    <div class="news-title">주요 로펌 '${q}' 관련 최신 리걸 업데이트</div>
                    <a href="https://www.google.com/search?q=site:kimchang.com+OR+site:yulchon.com+OR+site:shinkim.com+${encodedQ}+뉴스레터" target="_blank" class="news-link">로펌 레터 통합검색 ↗</a>
                </div>
                <div class="news-card">
                    <span class="news-badge" style="background-color: #1e3799;">법률신문 / 리걸타임즈</span>
                    <div class="news-title">'${q}' 관련 실무진 필독 뉴스 및 기획 기사</div>
                    <a href="https://www.google.com/search?q=site:lawtimes.co.kr+OR+site:legaltimes.co.kr+${encodedQ}" target="_blank" class="news-link">미디어 동향 보기 ↗</a>
                </div>
            `;
        }

        const legalKeywords = ["Attorney Client Privilege", "Anti-Corruption", "GDPR", "EU AI Act", "FCPA", "개인정보보호법", "공정거래법", "영업비밀 침해"];
        const searchInput = document.getElementById('searchInput');
        const autocompleteList = document.getElementById('autocompleteList');

        searchInput.addEventListener('input', function() {
            const val = this.value.toLowerCase();
            autocompleteList.innerHTML = '';
            if (!val) { autocompleteList.style.display = 'none'; return; }
            const filtered = legalKeywords.filter(k => k.toLowerCase().includes(val));
            if (filtered.length > 0) {
                autocompleteList.style.display = 'block';
                filtered.forEach(k => {
                    const d = document.createElement('div');
                    d.className = 'autocomplete-item';
                    d.innerHTML = `🔍 ${k}`;
                    d.onclick = () => { searchInput.value = k; autocompleteList.style.display = 'none'; performMainSearch(); };
                    autocompleteList.appendChild(d);
                });
            } else { autocompleteList.style.display = 'none'; }
        });

        function performMainSearch() {
            const q = searchInput.value;
            if (q.trim()) window.location.href = 'search_results.html?q=' + encodeURIComponent(q);
        }
        function quickSearch(q) { window.location.href = 'search_results.html?q=' + encodeURIComponent(q); }
        document.addEventListener('click', (e) => { if (e.target !== searchInput) autocompleteList.style.display = 'none'; });
    </script>
</body>
</html>
